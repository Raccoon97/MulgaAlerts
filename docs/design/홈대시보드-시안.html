<title>물가를알려줘 — 홈 대시보드 시안</title>
<style>
  :root {
    --bg: #F6F7F3;
    --surface: #FFFFFF;
    --surface-2: #EFF2EC;
    --ink: #20291F;
    --muted: #68766A;
    --line: #E2E7DD;
    --accent: #1E7A46;
    --accent-ink: #FFFFFF;
    --cheap: #1E7A46;
    --cheap-bg: #E2F2E8;
    --pricey: #C9432F;
    --pricey-bg: #FAE9E5;
    --ok: #5A685C;
    --ok-bg: #ECEFE9;
    --up: #D6403A;
    --down: #2E6FBF;
    --shadow: 0 1px 2px rgba(32,41,31,.05), 0 4px 14px rgba(32,41,31,.06);
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141A15;
      --surface: #1C231D;
      --surface-2: #232B24;
      --ink: #E7EDE6;
      --muted: #94A296;
      --line: #2B342C;
      --accent: #4CC57F;
      --accent-ink: #10190F;
      --cheap: #5ECD8C;
      --cheap-bg: #1D3326;
      --pricey: #F08A76;
      --pricey-bg: #3A241E;
      --ok: #A9B5AA;
      --ok-bg: #262E27;
      --up: #F07A72;
      --down: #6FA8E8;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
    }
  }
  :root[data-theme="dark"] {
    --bg: #141A15; --surface: #1C231D; --surface-2: #232B24; --ink: #E7EDE6;
    --muted: #94A296; --line: #2B342C; --accent: #4CC57F; --accent-ink: #10190F;
    --cheap: #5ECD8C; --cheap-bg: #1D3326; --pricey: #F08A76; --pricey-bg: #3A241E;
    --ok: #A9B5AA; --ok-bg: #262E27; --up: #F07A72; --down: #6FA8E8;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
  }
  :root[data-theme="light"] {
    --bg: #F6F7F3; --surface: #FFFFFF; --surface-2: #EFF2EC; --ink: #20291F;
    --muted: #68766A; --line: #E2E7DD; --accent: #1E7A46; --accent-ink: #FFFFFF;
    --cheap: #1E7A46; --cheap-bg: #E2F2E8; --pricey: #C9432F; --pricey-bg: #FAE9E5;
    --ok: #5A685C; --ok-bg: #ECEFE9; --up: #D6403A; --down: #2E6FBF;
    --shadow: 0 1px 2px rgba(32,41,31,.05), 0 4px 14px rgba(32,41,31,.06);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", -apple-system, "Malgun Gothic", sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; color: inherit; }
  :is(button, select):focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .frame { max-width: 1080px; margin: 0 auto; padding: 0 20px 64px; }

  /* ── 시안 안내 배너 ─────────────────────────── */
  .memo {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin: 16px 0 8px; padding: 10px 14px;
    background: var(--surface-2); border: 1px dashed var(--line); border-radius: 10px;
    font-size: 12.5px; color: var(--muted);
  }
  .memo b { color: var(--ink); font-weight: 700; }

  /* ── 앱 헤더 ───────────────────────────────── */
  .app-head {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
    padding: 26px 0 18px; flex-wrap: wrap;
  }
  .brand { display: flex; flex-direction: column; gap: 4px; }
  .brand .logo {
    font-size: 26px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2;
  }
  .brand .logo .dot { color: var(--accent); }
  .brand .meta { font-size: 13px; color: var(--muted); }
  .head-actions { display: flex; gap: 8px; }
  .chip-btn {
    border: 1px solid var(--line); background: var(--surface); border-radius: 999px;
    padding: 7px 14px; font-size: 13px; cursor: pointer;
  }
  .chip-btn:hover { border-color: var(--accent); }

  /* ── 요약 밴드 ─────────────────────────────── */
  .summary {
    display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: center;
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 18px 20px; margin-bottom: 18px;
  }
  .summary .title { font-size: 14px; font-weight: 700; margin: 0 0 8px; }
  .stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat {
    display: inline-flex; align-items: baseline; gap: 6px;
    border: 1px solid var(--line); border-radius: 10px; padding: 8px 12px;
    background: var(--bg); font-size: 13px; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .stat strong { font-size: 17px; font-weight: 800; color: var(--ink); }
  .stat.rise strong { color: var(--up); }
  .stat.fall strong { color: var(--down); }
  .verdict-chips { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .vchip {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid transparent; border-radius: 999px; padding: 6px 12px;
    font-size: 12.5px; font-weight: 700; cursor: pointer; background: var(--ok-bg);
  }
  .vchip .n { font-variant-numeric: tabular-nums; }
  .vchip.cheap { background: var(--cheap-bg); color: var(--cheap); }
  .vchip.pricey { background: var(--pricey-bg); color: var(--pricey); }
  .vchip[aria-pressed="true"] { border-color: currentColor; }
  .vchip:hover { filter: brightness(0.97); }

  /* ── 컨트롤: 카테고리 탭 + 정렬 + 보기 전환 ── */
  .controls {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .tab {
    border: 1px solid var(--line); background: var(--surface); border-radius: 999px;
    padding: 7px 14px; font-size: 13.5px; cursor: pointer; color: var(--muted);
  }
  .tab:hover { color: var(--ink); }
  .tab[aria-pressed="true"] {
    background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 700;
  }
  .controls select {
    border: 1px solid var(--line); background: var(--surface); color: var(--ink);
    border-radius: 10px; padding: 8px 10px; font-size: 13px;
  }
  .view-toggle { display: flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .view-toggle button {
    border: 0; background: var(--surface); padding: 8px 13px; font-size: 13px; cursor: pointer; color: var(--muted);
  }
  .view-toggle button[aria-pressed="true"] { background: var(--surface-2); color: var(--ink); font-weight: 700; }

  /* ── 품목 카드 (그리드형) ───────────────────── */
  .board.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(236px, 1fr)); gap: 14px; }
  .card {
    position: relative; display: flex; flex-direction: column; gap: 10px;
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 16px;
  }
  @media (prefers-reduced-motion: no-preference) {
    .card { transition: transform .15s ease, box-shadow .15s ease; }
    .board.grid .card:hover { transform: translateY(-2px); box-shadow: 0 2px 4px rgba(32,41,31,.06), 0 10px 24px rgba(32,41,31,.09); }
  }
  .card .top { display: flex; align-items: center; gap: 10px; }
  .food {
    width: 40px; height: 40px; border-radius: 12px; flex: none;
    display: grid; place-items: center; font-size: 21px; background: var(--surface-2);
  }
  .card h3 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
  .card .unit { font-size: 12px; color: var(--muted); font-weight: 500; }
  .star {
    margin-left: auto; border: 0; background: none; cursor: pointer;
    font-size: 17px; color: var(--line); padding: 2px 4px; line-height: 1;
  }
  .star[aria-pressed="true"] { color: #E8A93C; }
  .star:hover { color: #E8A93C; }

  .price-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .price { font-size: 22px; font-weight: 800; letter-spacing: -0.4px; font-variant-numeric: tabular-nums; }
  .delta { font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .delta.up { color: var(--up); }
  .delta.down { color: var(--down); }
  .delta.flat { color: var(--muted); }
  .normal-line { font-size: 12.5px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* 평시 밴드 게이지: -30% ~ +30% 축, 가운데 ±10%가 정상 밴드 */
  .gauge { position: relative; height: 14px; }
  .gauge .track {
    position: absolute; inset: 5px 0; border-radius: 4px;
    background: linear-gradient(to right, var(--cheap-bg), var(--surface-2) 33.3%, var(--surface-2) 66.6%, var(--pricey-bg));
  }
  .gauge .band {
    position: absolute; top: 5px; bottom: 5px; left: 33.3%; width: 33.3%;
    border-left: 1px solid var(--line); border-right: 1px solid var(--line);
  }
  .gauge .dot {
    position: absolute; top: 1px; width: 12px; height: 12px; border-radius: 50%;
    transform: translateX(-50%); border: 2px solid var(--surface);
    box-shadow: 0 1px 3px rgba(0,0,0,.25);
  }
  .cheap-item .gauge .dot { background: var(--cheap); }
  .ok-item .gauge .dot { background: var(--ok); }
  .pricey-item .gauge .dot { background: var(--pricey); }

  .verdict-row { display: flex; align-items: center; gap: 8px; }
  .badge {
    flex: none; font-size: 12px; font-weight: 800; border-radius: 7px; padding: 3px 9px;
  }
  .cheap-item .badge { background: var(--cheap-bg); color: var(--cheap); }
  .ok-item .badge { background: var(--ok-bg); color: var(--ok); }
  .pricey-item .badge { background: var(--pricey-bg); color: var(--pricey); }
  .hint { font-size: 12px; color: var(--muted); }

  /* ── 리스트형 ──────────────────────────────── */
  .board.list { display: flex; flex-direction: column; gap: 8px; }
  .board.list .card {
    display: grid; align-items: center; gap: 6px 14px; padding: 12px 16px;
    grid-template-columns: minmax(150px, 1.2fr) minmax(130px, 1fr) minmax(110px, 1fr) minmax(120px, 1fr) auto;
    grid-template-areas: "top price normal gauge verdict";
  }
  .board.list .top { grid-area: top; }
  .board.list .price-row { grid-area: price; }
  .board.list .normal-line { grid-area: normal; }
  .board.list .gauge { grid-area: gauge; }
  .board.list .verdict-row { grid-area: verdict; justify-content: flex-end; }
  .board.list .hint { display: none; }
  .board.list .price { font-size: 18px; }
  .board.list .food { width: 34px; height: 34px; font-size: 18px; border-radius: 10px; }
  .board.list .star { margin-left: 6px; order: 5; }
  @media (max-width: 720px) {
    .board.list .card {
      grid-template-columns: 1fr auto;
      grid-template-areas: "top verdict" "price price" "normal normal" "gauge gauge";
    }
    .board.list .verdict-row { justify-content: flex-start; }
    .summary { grid-template-columns: 1fr; }
    .verdict-chips { flex-direction: row; align-items: center; }
  }

  .empty { text-align: center; color: var(--muted); padding: 48px 0; font-size: 14px; }
  .foot-note { margin-top: 28px; font-size: 12px; color: var(--muted); text-align: center; }
</style>

<div class="frame">
  <div class="memo">
    <b>디자인 시안 v1</b>
    <span>보기 전환으로 <b>A안(카드형)</b> / <b>B안(리스트형)</b>을 비교하세요 · 카테고리·정렬·판정 필터 동작함 · 데이터는 예시값</span>
  </div>

  <header class="app-head">
    <div class="brand">
      <div class="logo">물가를알려줘<span class="dot">.</span></div>
      <div class="meta">7월 17일 (금) 기준 · 전국 평균 소매가</div>
    </div>
    <div class="head-actions">
      <button class="chip-btn" id="regionBtn">📍 전국</button>
      <button class="chip-btn" id="themeBtn">🌗 테마</button>
    </div>
  </header>

  <section class="summary" aria-label="오늘의 요약">
    <div>
      <p class="title" id="summaryTitle"></p>
      <div class="stats" id="stats"></div>
    </div>
    <div class="verdict-chips">
      <button class="vchip cheap" id="chipCheap" aria-pressed="false">🟢 지금 사면 좋은 품목 <span class="n"></span></button>
      <button class="vchip pricey" id="chipPricey" aria-pressed="false">🔴 기다리면 좋은 품목 <span class="n"></span></button>
    </div>
  </section>

  <div class="controls">
    <div class="tabs" id="tabs" role="group" aria-label="카테고리"></div>
    <select id="sortSel" aria-label="정렬">
      <option value="riseDesc">많이 오른 순</option>
      <option value="riseAsc">많이 내린 순</option>
      <option value="devAsc">저렴한 순</option>
      <option value="name">가나다순</option>
    </select>
    <div class="view-toggle" role="group" aria-label="보기 전환">
      <button id="viewGrid" aria-pressed="true">카드형</button>
      <button id="viewList" aria-pressed="false">리스트형</button>
    </div>
  </div>

  <main class="board grid" id="board" aria-live="polite"></main>

  <p class="foot-note">평시 가격 = 최근 3년 같은 시기(±2주) 소매가 중앙값 · 자료: KAMIS 농수산물유통정보 (시안 예시값)</p>
</div>

<script>
  const ITEMS = [
    { name: "배추",     unit: "1포기",     emoji: "🥬", cat: "채소", price: 5980,  prev: 5760,  normal: 4600 },
    { name: "애호박",   unit: "1개",       emoji: "🥒", cat: "채소", price: 2480,  prev: 2350,  normal: 1800 },
    { name: "상추",     unit: "100g",      emoji: "🥗", cat: "채소", price: 1480,  prev: 1320,  normal: 980  },
    { name: "오이",     unit: "3개",       emoji: "🥒", cat: "채소", price: 3240,  prev: 3180,  normal: 2900 },
    { name: "양파",     unit: "1kg",       emoji: "🧅", cat: "채소", price: 1650,  prev: 1690,  normal: 2100 },
    { name: "감자",     unit: "1kg",       emoji: "🥔", cat: "채소", price: 2190,  prev: 2280,  normal: 2600 },
    { name: "무",       unit: "1개",       emoji: "🥕", cat: "채소", price: 2340,  prev: 2300,  normal: 2200 },
    { name: "대파",     unit: "1kg",       emoji: "🌿", cat: "채소", price: 2890,  prev: 2980,  normal: 3100 },
    { name: "사과",     unit: "10개",      emoji: "🍎", cat: "과일", price: 32400, prev: 31800, normal: 27000 },
    { name: "수박",     unit: "1통",       emoji: "🍉", cat: "과일", price: 21800, prev: 22300, normal: 22000 },
    { name: "토마토",   unit: "1kg",       emoji: "🍅", cat: "과일", price: 4980,  prev: 5080,  normal: 5400 },
    { name: "바나나",   unit: "100g",      emoji: "🍌", cat: "과일", price: 298,   prev: 302,   normal: 340 },
    { name: "계란",     unit: "특란 30구", emoji: "🥚", cat: "축산", price: 6180,  prev: 6260,  normal: 6950 },
    { name: "삼겹살",   unit: "100g",      emoji: "🥓", cat: "축산", price: 2690,  prev: 2670,  normal: 2750 },
    { name: "닭고기",   unit: "1kg",       emoji: "🍗", cat: "축산", price: 5990,  prev: 6140,  normal: 6300 },
    { name: "고등어",   unit: "1마리",     emoji: "🐟", cat: "수산", price: 4490,  prev: 4290,  normal: 3900 },
    { name: "오징어",   unit: "1마리",     emoji: "🦑", cat: "수산", price: 4280,  prev: 4300,  normal: 4500 },
    { name: "쌀",       unit: "20kg",      emoji: "🌾", cat: "곡물", price: 59800, prev: 59400, normal: 58000 },
    { name: "두부",     unit: "1모",       emoji: "🧊", cat: "곡물", price: 1890,  prev: 1880,  normal: 1800 },
  ];
  const CATS = ["전체", "채소", "과일", "축산", "수산", "곡물"];
  const CHEAP_T = -0.10, PRICEY_T = 0.10, MOVE_T = 0.02;

  const state = { cat: "전체", sort: "riseDesc", view: "grid", verdict: null, favs: new Set(["계란", "삼겹살"]) };

  const dev = it => (it.price - it.normal) / it.normal;
  const chg = it => (it.price - it.prev) / it.prev;
  const verdictOf = it => dev(it) <= CHEAP_T ? "cheap" : dev(it) >= PRICEY_T ? "pricey" : "ok";
  const won = n => n.toLocaleString("ko-KR") + "원";
  const pct = v => (v > 0 ? "+" : v < 0 ? "−" : "") + Math.abs(v * 100).toFixed(1) + "%";

  function deltaHtml(it) {
    const c = chg(it);
    if (c >= MOVE_T)  return `<span class="delta up">▲ ${pct(c)}</span>`;
    if (c <= -MOVE_T) return `<span class="delta down">▼ ${pct(c)}</span>`;
    return `<span class="delta flat">➖ 보합</span>`;
  }
  function hintText(it) {
    const d = dev(it), p = Math.abs(Math.round(d * 100));
    if (verdictOf(it) === "cheap")  return `평시보다 ${p}% 저렴 — 사기 좋은 시기`;
    if (verdictOf(it) === "pricey") return `평시보다 ${p}% 비쌈 — 기다려 볼 만해요`;
    return `평시 수준 (${pct(d)})`;
  }

  function cardHtml(it) {
    const v = verdictOf(it);
    const label = { cheap: "저렴", ok: "보통", pricey: "비쌈" }[v];
    const pos = Math.min(0.97, Math.max(0.03, (dev(it) + 0.3) / 0.6)); // -30%~+30% 축
    const fav = state.favs.has(it.name);
    return `
    <article class="card ${v}-item">
      <div class="top">
        <span class="food" aria-hidden="true">${it.emoji}</span>
        <h3>${it.name} <span class="unit">${it.unit}</span></h3>
        <button class="star" data-fav="${it.name}" aria-pressed="${fav}" aria-label="${it.name} 즐겨찾기">★</button>
      </div>
      <div class="price-row"><span class="price">${won(it.price)}</span>${deltaHtml(it)}</div>
      <div class="normal-line">평시 ${won(it.normal)}</div>
      <div class="gauge" role="img" aria-label="평시 대비 ${pct(dev(it))}">
        <div class="track"></div><div class="band"></div>
        <div class="dot" style="left:${(pos * 100).toFixed(1)}%"></div>
      </div>
      <div class="verdict-row"><span class="badge">${label}</span><span class="hint">${hintText(it)}</span></div>
    </article>`;
  }

  function render() {
    let list = ITEMS.filter(it => state.cat === "전체" || it.cat === state.cat);
    if (state.verdict) list = list.filter(it => verdictOf(it) === state.verdict);
    const sorters = {
      riseDesc: (a, b) => chg(b) - chg(a),
      riseAsc:  (a, b) => chg(a) - chg(b),
      devAsc:   (a, b) => dev(a) - dev(b),
      name:     (a, b) => a.name.localeCompare(b.name, "ko"),
    };
    list = [...list].sort(sorters[state.sort]);
    list.sort((a, b) => (state.favs.has(b.name) ? 1 : 0) - (state.favs.has(a.name) ? 1 : 0));

    const board = document.getElementById("board");
    board.className = "board " + state.view;
    board.innerHTML = list.length
      ? list.map(cardHtml).join("")
      : `<p class="empty">조건에 맞는 품목이 없어요</p>`;

    board.querySelectorAll(".star").forEach(btn => btn.addEventListener("click", () => {
      const k = btn.dataset.fav;
      state.favs.has(k) ? state.favs.delete(k) : state.favs.add(k);
      render();
    }));

    // 요약
    const scope = ITEMS.filter(it => state.cat === "전체" || it.cat === state.cat);
    const rise = scope.filter(it => chg(it) >= MOVE_T).length;
    const fall = scope.filter(it => chg(it) <= -MOVE_T).length;
    const flat = scope.length - rise - fall;
    document.getElementById("summaryTitle").textContent =
      `오늘 ${state.cat === "전체" ? "" : state.cat + " "}${scope.length}개 품목 요약`;
    document.getElementById("stats").innerHTML = `
      <span class="stat rise">▲ 상승 <strong>${rise}</strong></span>
      <span class="stat fall">▼ 하락 <strong>${fall}</strong></span>
      <span class="stat">➖ 보합 <strong>${flat}</strong></span>`;
    document.querySelector("#chipCheap .n").textContent = scope.filter(it => verdictOf(it) === "cheap").length + "개";
    document.querySelector("#chipPricey .n").textContent = scope.filter(it => verdictOf(it) === "pricey").length + "개";
    document.getElementById("chipCheap").setAttribute("aria-pressed", state.verdict === "cheap");
    document.getElementById("chipPricey").setAttribute("aria-pressed", state.verdict === "pricey");
  }

  // 컨트롤 초기화
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = CATS.map(c => `<button class="tab" data-cat="${c}" aria-pressed="${c === state.cat}">${c}</button>`).join("");
  tabsEl.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
    state.cat = t.dataset.cat;
    tabsEl.querySelectorAll(".tab").forEach(x => x.setAttribute("aria-pressed", x === t));
    render();
  }));
  document.getElementById("sortSel").addEventListener("change", e => { state.sort = e.target.value; render(); });
  document.getElementById("viewGrid").addEventListener("click", () => setView("grid"));
  document.getElementById("viewList").addEventListener("click", () => setView("list"));
  function setView(v) {
    state.view = v;
    document.getElementById("viewGrid").setAttribute("aria-pressed", v === "grid");
    document.getElementById("viewList").setAttribute("aria-pressed", v === "list");
    render();
  }
  const toggleVerdict = v => { state.verdict = state.verdict === v ? null : v; render(); };
  document.getElementById("chipCheap").addEventListener("click", () => toggleVerdict("cheap"));
  document.getElementById("chipPricey").addEventListener("click", () => toggleVerdict("pricey"));
  document.getElementById("themeBtn").addEventListener("click", () => {
    const r = document.documentElement;
    const dark = r.dataset.theme === "dark" || (!r.dataset.theme && matchMedia("(prefers-color-scheme: dark)").matches);
    r.dataset.theme = dark ? "light" : "dark";
  });
  document.getElementById("regionBtn").addEventListener("click", () => alert("지역 선택은 시안 범위 밖이에요 (전국/시·도 전환 예정)"));

  render();
</script>

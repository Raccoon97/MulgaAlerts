name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 사전 조건: 저장소 Settings → Pages → Source를 "GitHub Actions"로 설정
      - uses: actions/configure-pages@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 테스트
        working-directory: app
        run: |
          flutter pub get
          flutter analyze
          flutter test

      - name: 웹 빌드
        working-directory: app
        # API_BASE_URL: 저장소 변수 우선, 없으면 집 서버 터널 URL (임시 호스팅)
        run: >
          flutter build web --release
          --base-href "/MulgaAlerts/"
          --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://loops-adoption-surely-soma.trycloudflare.com' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
